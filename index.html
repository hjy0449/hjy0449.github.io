<!DOCTYPE html>
<html>
<head>
	<title>Welcome to my website!</title>
	<link type="text/css" rel="stylesheet" href="style.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bitcount+Grid+Double+Ink:wght@100..900&family=Playwrite+DK+Uloopet+Guides&display=swap" rel="stylesheet">
	<meta name="viewport" content="width=device-width, intial-scale=1">
</head>
<body>
	<div class="container">
		<div class="intro">
			<!-- you can replace with your own profile picture -->
			<!-- or use random portrait image here: https://source.unsplash.com/100x100/?portrait -->
			<img class="profile-picture" src="images/circle.jpg" />
			<h1>My Full Name</h1>
			<h3>Web and AI Developer at My Company</h3>
			<p>{{ My motivation/motto }}</p>
		</div>

		<div class="about-grid">
			<div class="i-am">
				<h3>I am</h3>
				<ul class="about-list">
					<li>An student</li>
					<li>A reader</li>
					<li>A hobby drumer</li>
				</ul>
			</div>
			<div class="i-like">
				<h3>I like to</h3>
				<ul class="about-list">
					<li>Listen to music</li>
					<li>Watch movie</li>
					<li>Eat spicy food</li>
				</ul>
			</div>
		</div>

		<div class="projects-heading">
			<h3>My Favorite</h3>
			<div class="projects-grid">
				<!-- you can replace with your own projects images -->
				<!-- or use random image here: https://source.unsplash.com/random/300x300/?img=1 -->
				<img class="project-image" src="images/clover.jpg"/>
				<img class="project-image" src="images/bingo2.jpg"/>
				<img class="project-image" src="images/pikmin1.jpg"/>
				<img class="project-image" src="images/pikmin2.jpg"/>
			</div>
		</div>

		<div class="links-and-contact">
			<div class="links">
				<h3>Links</h3>
				<ul class="links-list">
					<li>
						<a href="https://github.com/">Github</a>
					</li>
					<li>
						<a href="https://twitter.com/">Twitter</a>
					</li>
					<li>
						<a href="https://linkedin.com">Linkedin</a>
					</li>
				</ul>
			</div>

			<div>
				<form action="#">
					<label for="email">
						Email: <input type="email" id="email" placeholder="Enter your email" /> 
					</label>
					<label for="message">
						Message: <textarea id="message">Your Message</textarea>
					</label>
					<input type="submit" class="submit-button-wrapper " valid="Send Message" />
				</form>
			</div>
		</div>
		<div class="map">
			<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3163.0244696565233!2d126.91255347587331!3d37.55448727204183!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x357c998dee52e68b%3A0x8a0b4ab9b5eef771!2z64u07YOd!5e0!3m2!1sko!2skr!4v1774365803733!5m2!1sko!2skr" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
		</div>
	</div>
</body>
</html>
